<!DOCTYPE html><html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>עלייה לתורה להראל שקד</title>
  <meta name="description" content="נרגשים להזמין אתכם לעלייה לתורה של הראל שקד בבית הכנסת לב חריש" />
  <style>
    * { box-sizing: border-box; }body {
  margin: 0;
  min-height: 100vh;
  font-family: Arial, "Helvetica Neue", sans-serif;
  background:
    radial-gradient(circle at top, rgba(255, 244, 220, .95), rgba(245, 228, 195, .82) 34%, rgba(5, 24, 45, 1) 84%),
    #061d33;
  color: #08223d;
  display: flex;
  justify-content: center;
  padding: 14px;
}

.invite {
  width: min(100%, 430px);
  min-height: calc(100vh - 28px);
  background: #f8edda;
  border: 5px solid #08223d;
  border-radius: 30px;
  overflow: hidden;
  box-shadow: 0 24px 70px rgba(0,0,0,.35);
  position: relative;
}

.invite::before {
  content: "";
  position: absolute;
  inset: 10px;
  border: 2px solid #d1ad64;
  border-radius: 22px;
  pointer-events: none;
  z-index: 3;
}

.paper {
  position: relative;
  min-height: 100%;
  background:
    radial-gradient(circle at 50% 10%, rgba(255,255,255,.6), transparent 28%),
    linear-gradient(rgba(248,237,218,.92), rgba(248,237,218,.96));
  padding: 34px 24px 0;
  overflow: hidden;
}

.olive {
  position: absolute;
  top: 16px;
  right: 18px;
  font-size: 3.2rem;
  transform: rotate(-18deg);
  opacity: .75;
  z-index: 1;
}

.headline {
  position: relative;
  z-index: 2;
  text-align: center;
  padding-top: 10px;
}

.top-line {
  font-size: 1.28rem;
  font-weight: 900;
  color: #08223d;
  margin: 0 0 8px;
  letter-spacing: .2px;
}

.sub-line {
  font-size: 1.12rem;
  color: #173b5f;
  font-weight: 800;
  margin: 0 0 4px;
}

.small-star {
  color: #b5893a;
  font-size: 1.25rem;
  margin: 6px 0 0;
}

h1 {
  margin: 0;
  color: #08223d;
  font-size: clamp(4.2rem, 16vw, 6.1rem);
  line-height: .92;
  font-weight: 900;
  letter-spacing: -2px;
}

.decor-star {
  color: #a67a2a;
  font-size: 2.2rem;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 14px;
  margin: 12px auto 6px;
}

.decor-star::before,
.decor-star::after {
  content: "";
  width: 72px;
  height: 2px;
  background: linear-gradient(90deg, transparent, #a67a2a);
}

.decor-star::after {
  background: linear-gradient(90deg, #a67a2a, transparent);
}

.scene {
  position: relative;
  z-index: 2;
  height: 380px;
  margin: 12px -24px 0;
  overflow: hidden;
}

.torah {
  position: absolute;
  left: 0;
  bottom: 36px;
  width: 48%;
  height: 235px;
  transform: rotate(-8deg);
  filter: drop-shadow(0 12px 10px rgba(0,0,0,.20));
}

.torah-board {
  position: absolute;
  inset: 58px 0 0 0;
  background: linear-gradient(135deg, #6a401d, #2d1709);
  border-radius: 10px;
}

.scroll {
  position: absolute;
  top: 16px;
  width: 58px;
  height: 210px;
  background: linear-gradient(90deg, #fff5d8, #dfc18a, #fff2cf);
  border-radius: 28px;
  border: 2px solid #9b641f;
}

.scroll.one { left: 38px; }
.scroll.two { left: 104px; }

.scroll::before,
.scroll::after {
  content: "";
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
  width: 80px;
  height: 18px;
  background: linear-gradient(90deg, #6a3b14, #d38c2f, #5c300f);
  border-radius: 999px;
}

.scroll::before { top: -10px; }
.scroll::after { bottom: -10px; }

.fake-text {
  position: absolute;
  top: 42px;
  left: 22px;
  right: 22px;
  height: 126px;
  background: repeating-linear-gradient(to bottom, rgba(50,35,18,.65) 0 2px, transparent 2px 7px);
  opacity: .45;
}

.building {
  position: absolute;
  right: 0;
  bottom: 34px;
  width: 52%;
  height: 250px;
  filter: drop-shadow(0 12px 10px rgba(0,0,0,.10));
}

.building-body {
  position: absolute;
  right: 16px;
  bottom: 0;
  width: 168px;
  height: 225px;
  background:
    linear-gradient(135deg, rgba(255,255,255,.35), transparent),
    repeating-linear-gradient(0deg, transparent 0 24px, rgba(145,105,52,.18) 24px 26px),
    repeating-linear-gradient(90deg, transparent 0 34px, rgba(145,105,52,.16) 34px 36px),
    #d8b783;
  border: 2px solid rgba(125,88,40,.35);
  border-radius: 8px 8px 0 0;
}

.building-body::before {
  content: "בית הכנסת\A לב חריש";
  white-space: pre;
  position: absolute;
  top: 28px;
  left: 0;
  right: 0;
  text-align: center;
  color: #493516;
  font-size: 1rem;
  line-height: 1.35;
  font-weight: 900;
  transform: rotate(-2deg);
}

.arch {
  position: absolute;
  right: 54px;
  bottom: 0;
  width: 64px;
  height: 122px;
  background: #b98e55;
  border-radius: 34px 34px 0 0;
  box-shadow: inset 0 0 0 12px rgba(255,238,200,.65);
}

.flagpole {
  position: absolute;
  right: 202px;
  bottom: 0;
  width: 4px;
  height: 260px;
  background: #ddd;
  border-radius: 999px;
}

.flag {
  position: absolute;
  right: 205px;
  top: 10px;
  width: 66px;
  height: 45px;
  background: linear-gradient(#fff 0 24%, #2b6db6 24% 35%, #fff 35% 65%, #2b6db6 65% 76%, #fff 76%);
  border-radius: 2px 10px 10px 2px;
  box-shadow: 0 4px 10px rgba(0,0,0,.14);
}

.flag::after {
  content: "✡";
  color: #2b6db6;
  position: absolute;
  inset: 0;
  display: grid;
  place-items: center;
  font-size: 1.2rem;
}

.shrubs {
  position: absolute;
  right: 28px;
  bottom: -8px;
  width: 170px;
  height: 58px;
  background: radial-gradient(circle at 20% 80%, #6e7a3c 0 20px, transparent 21px), radial-gradient(circle at 45% 65%, #6d843f 0 30px, transparent 31px), radial-gradient(circle at 70% 75%, #596b31 0 24px, transparent 25px);
}

.navy-curve {
  position: relative;
  z-index: 2;
  margin: -58px -24px 0;
  background: #08223d;
  min-height: 330px;
  border-radius: 55% 55% 0 0 / 12% 12% 0 0;
  border-top: 4px solid #d1ad64;
  padding: 50px 20px 26px;
  color: #fff8ea;
}

.medallion {
  position: absolute;
  top: -28px;
  left: 50%;
  transform: translateX(-50%);
  width: 72px;
  height: 72px;
  background: #08223d;
  border: 4px solid #d1ad64;
  border-radius: 999px;
  display: grid;
  place-items: center;
  color: #d1ad64;
  font-size: 2.3rem;
  z-index: 3;
}

.info-panel {
  background: #fff8ea;
  color: #08223d;
  border: 2px solid #d1ad64;
  border-radius: 20px;
  padding: 16px;
  box-shadow: 0 16px 28px rgba(0,0,0,.18);
}

.info-grid {
  display: grid;
  grid-template-columns: .9fr 1.1fr 1.1fr;
  gap: 12px;
  align-items: stretch;
}

.box {
  text-align: center;
  border-left: 1px solid rgba(181,137,58,.45);
  padding: 4px 8px;
  display: grid;
  align-content: center;
}

.box:first-child { border-left: 0; }

.icon-small {
  color: #a67a2a;
  font-size: 1.3rem;
  margin-bottom: 4px;
}

.big-date {
  font-size: 2.05rem;
  font-weight: 900;
  line-height: 1;
}

.label {
  font-size: .92rem;
  font-weight: 800;
  color: #493516;
  margin-top: 4px;
}

.he-date {
  font-size: 1.22rem;
  font-weight: 900;
}

.schedule {
  font-size: .92rem;
  font-weight: 900;
  text-align: right;
}

.schedule-row {
  display: flex;
  justify-content: space-between;
  gap: 8px;
  padding: 4px 0;
  border-bottom: 1px solid rgba(181,137,58,.28);
}

.schedule-row:last-child { border-bottom: 0; }

.time { color: #08223d; font-weight: 900; }

.place {
  margin: 13px 0 10px;
  border-top: 1px solid rgba(181,137,58,.55);
  padding-top: 10px;
  text-align: center;
}

.place-title {
  font-size: 1.32rem;
  font-weight: 900;
}

.address {
  margin-top: 3px;
  font-size: .95rem;
  font-weight: 800;
  color: #493516;
}

.waze-btn {
  width: min(100%, 280px);
  margin: 10px auto 0;
  min-height: 42px;
  border-radius: 999px;
  background: linear-gradient(135deg, #0d3155, #08223d);
  color: #fff8ea;
  text-decoration: none;
  border: 2px solid #d1ad64;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  font-weight: 900;
  box-shadow: inset 0 0 0 1px rgba(255,255,255,.08), 0 8px 16px rgba(0,0,0,.15);
}

.waze-icon {
  width: 28px;
  height: 28px;
  border-radius: 999px;
  background: #fff;
  color: #08223d;
  display: grid;
  place-items: center;
  font-size: 1rem;
}

.footer {
  text-align: center;
  color: #d1ad64;
  font-size: 1.25rem;
  font-weight: 900;
  margin-top: 16px;
}

@media (max-width: 380px) {
  .paper { padding-inline: 18px; }
  .scene { margin-inline: -18px; height: 350px; }
  .navy-curve { margin-inline: -18px; padding-inline: 14px; }
  .info-grid { gap: 8px; }
  .big-date { font-size: 1.75rem; }
  .schedule { font-size: .82rem; }
}

  </style>
</head>
<body>
  <main class="invite">
    <div class="paper">
      <div class="olive">🌿</div><header class="headline">
    <p class="top-line">נרגשים להזמין אתכם</p>
    <p class="sub-line">לעלייה לתורה של</p>
    <div class="small-star">✡</div>
    <h1>הראל שקד</h1>
    <div class="decor-star">✡</div>
  </header>

  <section class="scene" aria-hidden="true">
    <div class="torah">
      <div class="torah-board"></div>
      <div class="scroll one"><div class="fake-text"></div></div>
      <div class="scroll two"><div class="fake-text"></div></div>
    </div>

    <div class="building">
      <div class="flagpole"></div>
      <div class="flag"></div>
      <div class="building-body"><div class="arch"></div></div>
      <div class="shrubs"></div>
    </div>
  </section>

  <section class="navy-curve">
    <div class="medallion">✡</div>

    <div class="info-panel">
      <div class="info-grid">
        <div class="box">
          <div class="icon-small">▦</div>
          <div class="big-date">18/05</div>
          <div class="label">יום שני</div>
        </div>

        <div class="box">
          <div class="he-date">ב׳ בסיון תשפ״ו</div>
        </div>

        <div class="box schedule">
          <div class="schedule-row"><span>קבלת פנים</span><span class="time">14:30</span></div>
          <div class="schedule-row"><span>עלייה לתורה</span><span class="time">15:00</span></div>
          <div class="schedule-row"><span>סעודה קלה חלבית</span><span class="time">בסיום</span></div>
        </div>
      </div>

      <div class="place">
        <div class="place-title">בית הכנסת לב חריש</div>
        <div class="address">שוהם 82, חריש</div>
      </div>

      <a class="waze-btn" href="https://waze.com/ul/hsvbc0v75s" target="_blank" rel="noopener noreferrer">
        <span>להגעה לחצו כאן</span>
        <span class="waze-icon">🚙</span>
      </a>
    </div>

    <div class="footer">נשמח לראותכם!</div>
  </section>
</div>

  </main>
</body>
</html>
