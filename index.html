<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>עלייה לתורה להראל שקד</title>

  <meta property="og:title" content="עלייה לתורה להראל שקד" />
  <meta property="og:description" content="יום שני | 18/05 | בית הכנסת לב חריש" />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://castroeid.github.io/harel/" />
  <meta property="og:image" content="https://castroeid.github.io/harel/assets/invite-mobile.webp" />
  <meta property="og:image:secure_url" content="https://castroeid.github.io/harel/assets/invite-mobile.webp" />

  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:image" content="https://castroeid.github.io/harel/assets/invite-mobile.webp" />

  <link rel="preload" as="image" href="assets/invite-mobile.webp" />

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #0b223a;
    }

    .container {
      position: relative;
      width: 100%;
      max-width: 430px;
      height: 100vh;
      max-height: 900px;
      overflow: hidden;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,.5);
      background: #0b223a;
    }

    .bg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,.58), rgba(0,0,0,0) 48%);
      pointer-events: none;
    }

    .btn {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      width: 75%;
      height: 46px;
      border-radius: 999px;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-size: 0.95rem;
      font-weight: bold;
      text-decoration: none;
      border: 2px solid #c7a45a;
      box-shadow: 0 8px 16px rgba(0,0,0,.4);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      z-index: 5;
    }

    .waze-btn {
      bottom: calc(135px + env(safe-area-inset-bottom));
      background: linear-gradient(135deg, #0a3d68, #08223d);
    }

    .wa-btn {
      bottom: calc(70px + env(safe-area-inset-bottom));
      background: linear-gradient(135deg, #25D366, #128C7E);
    }

    .icon-img {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      background: white;
      padding: 3px;
      object-fit: contain;
      flex: 0 0 auto;
    }

    .icon-fallback {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      background: white;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: #08223d;
      font-size: 1rem;
      flex: 0 0 auto;
    }
  </style>
</head>

<body>
  <div class="container">
    <img class="bg"
         src="assets/invite-mobile.webp"
         alt="הזמנה לעלייה לתורה של הראל שקד"
         loading="eager"
         fetchpriority="high" />

    <div class="overlay"></div>

    <a class="btn waze-btn"
       href="https://waze.com/ul/hsvbbtq7xh"
       target="_blank"
       rel="noopener noreferrer">
      <span>להגעה לחצו כאן</span>
      <img src="assets/waze-icon.png" class="icon-img" alt="Waze" />
    </a>

    <a class="btn wa-btn"
       href="https://wa.me/972526211036?text=%D7%A0%D7%92%D7%99%D7%A2%20%D7%9C%D7%A2%D7%9C%D7%99%D7%99%D7%94%20%D7%9C%D7%AA%D7%95%D7%A8%D7%94%20%D7%A9%D7%9C%20%D7%94%D7%A8%D7%90%D7%9C%20%D7%91-18%2F05%20%D7%90%D7%A0%D7%97%D7%A0%D7%95%20%D7%A0%D7%94%D7%99%D7%94%20___%20%D7%90%D7%A0%D7%A9%D7%99%D7%9D"
       target="_blank"
       rel="noopener noreferrer">
      <span>אישור הגעה</span>
      <span class="icon-fallback">💬</span>
    </a>
  </div>
</body>
</html>
