<!DOCTYPE html><html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>עלייה לתורה להראל שקד</title>
  <meta name="description" content="נרגשים להזמין אתכם לעלייה לתורה של הראל שקד בבית הכנסת לב חריש" />
  <style>
    * {
      box-sizing: border-box;
    }body {
  margin: 0;
  min-height: 100vh;
  font-family: Arial, "Helvetica Neue", sans-serif;
  background: radial-gradient(circle at top, #f7ecd8 0%, #efe0c6 34%, #061d33 100%);
  color: #08223d;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 18px;
}

.card {
  width: min(100%, 430px);
  background: #fff8ea;
  border: 4px solid #08223d;
  border-radius: 28px;
  overflow: hidden;
  box-shadow: 0 24px 60px rgba(0,0,0,.28);
  position: relative;
}

.top-border {
  height: 10px;
  background: linear-gradient(90deg, #b5893a, #f1d38a, #b5893a);
}

.hero {
  padding: 34px 24px 20px;
  text-align: center;
  background:
    linear-gradient(rgba(255,248,234,.86), rgba(255,248,234,.92)),
    radial-gradient(circle at 20% 40%, rgba(181,137,58,.22), transparent 38%),
    radial-gradient(circle at 80% 55%, rgba(8,34,61,.12), transparent 38%);
}

.eyebrow {
  font-size: 1.25rem;
  font-weight: 800;
  margin: 0 0 8px;
  color: #08223d;
  letter-spacing: .2px;
}

.sub {
  font-size: 1.05rem;
  margin: 0 0 8px;
  color: #143452;
  font-weight: 700;
}

h1 {
  font-size: clamp(4.6rem, 17vw, 6.6rem);
  line-height: .9;
  margin: 8px 0 18px;
  color: #08223d;
  letter-spacing: -2px;
}

.star {
  color: #b5893a;
  font-size: 2rem;
  margin: 4px 0 18px;
}

.visuals {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
  margin-top: 18px;
  align-items: stretch;
}

.visual-box {
  background: rgba(8,34,61,.05);
  border: 1px solid rgba(181,137,58,.35);
  border-radius: 20px;
  padding: 18px 12px;
  min-height: 132px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 8px;
}

.icon {
  font-size: 3rem;
  line-height: 1;
}

.visual-title {
  font-size: .95rem;
  font-weight: 800;
  color: #08223d;
}

.details {
  background: #08223d;
  color: #fff8ea;
  padding: 22px;
}

.info-panel {
  background: #fff8ea;
  color: #08223d;
  border-radius: 22px;
  padding: 18px;
  border: 2px solid #d1ad64;
}

.date-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-bottom: 16px;
}

.date-box {
  text-align: center;
  border: 1px solid rgba(181,137,58,.55);
  border-radius: 16px;
  padding: 12px 8px;
  background: #fffdf5;
}

.big {
  font-size: 2rem;
  line-height: 1;
  font-weight: 900;
  color: #08223d;
}

.small {
  margin-top: 5px;
  font-size: .95rem;
  font-weight: 700;
  color: #4f432c;
}

.schedule {
  margin: 18px 0;
  border-top: 1px solid rgba(181,137,58,.5);
  border-bottom: 1px solid rgba(181,137,58,.5);
  padding: 12px 0;
}

.schedule-row {
  display: flex;
  justify-content: space-between;
  gap: 12px;
  padding: 9px 0;
  font-size: 1.05rem;
  font-weight: 800;
}

.schedule-row + .schedule-row {
  border-top: 1px solid rgba(181,137,58,.24);
}

.time {
  color: #08223d;
  min-width: 72px;
  text-align: left;
}

.place {
  text-align: center;
  margin: 16px 0 18px;
}

.place-title {
  font-size: 1.35rem;
  font-weight: 900;
  color: #08223d;
}

.address {
  margin-top: 4px;
  color: #4f432c;
  font-weight: 700;
}

.waze-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  width: 100%;
  min-height: 58px;
  border-radius: 999px;
  background: linear-gradient(135deg, #0b75c9, #0a4d88);
  color: white;
  text-decoration: none;
  font-size: 1.18rem;
  font-weight: 900;
  border: 2px solid #d1ad64;
  box-shadow: 0 10px 22px rgba(10,77,136,.28);
}

.waze-icon {
  width: 34px;
  height: 34px;
  border-radius: 50%;
  background: white;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 1.25rem;
}

.footer {
  text-align: center;
  padding: 18px 18px 22px;
  color: #f2d38a;
  font-size: 1.25rem;
  font-weight: 900;
}

@media (max-width: 380px) {
  .hero { padding-inline: 18px; }
  .details { padding: 16px; }
  .schedule-row { font-size: 1rem; }
}

  </style>
</head>
<body>
  <main class="card">
    <div class="top-border"></div><section class="hero">
  <p class="eyebrow">נרגשים להזמין אתכם</p>
  <p class="sub">לעלייה לתורה של</p>
  <h1>הראל שקד</h1>
  <div class="star">✡</div>

  <div class="visuals" aria-hidden="true">
    <div class="visual-box">
      <div class="icon">📜</div>
      <div class="visual-title">ספר תורה</div>
    </div>
    <div class="visual-box">
      <div class="icon">🇮🇱</div>
      <div class="visual-title">בית כנסת לב חריש</div>
    </div>
  </div>
</section>

<section class="details">
  <div class="info-panel">
    <div class="date-row">
      <div class="date-box">
        <div class="big">18/05</div>
        <div class="small">יום שני</div>
      </div>
      <div class="date-box">
        <div class="big">ב׳ בסיון</div>
        <div class="small">תשפ״ו</div>
      </div>
    </div>

    <div class="schedule">
      <div class="schedule-row">
        <span>קבלת פנים</span>
        <span class="time">14:30</span>
      </div>
      <div class="schedule-row">
        <span>עלייה לתורה</span>
        <span class="time">15:00</span>
      </div>
      <div class="schedule-row">
        <span>סעודה קלה חלבית</span>
        <span class="time">בסיום</span>
      </div>
    </div>

    <div class="place">
      <div class="place-title">בית הכנסת לב חריש</div>
      <div class="address">שוהם 82, חריש</div>
    </div>

    <a class="waze-btn" href="https://waze.com/ul/hsvbc0v75s" target="_blank" rel="noopener noreferrer">
      <span>להגעה לחצו כאן</span>
      <span class="waze-icon">🚙</span>
    </a>
  </div>

  <div class="footer">נשמח לראותכם!</div>
</section>

  </main>
</body>
</html>
