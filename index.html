<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>עלייה לתורה להראל שקד</title>
  <meta name="description" content="נרגשים להזמין אתכם לעלייה לתורה של הראל שקד בבית הכנסת לב חריש" />
  <style>
    * { box-sizing: border-box; }

    :root {
      --navy: #071f38;
      --navy-2: #0b2d4d;
      --gold: #c7a45a;
      --gold-2: #e3c984;
      --paper: #fbf3e5;
      --ink: #092641;
      --muted: #6a5631;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, "Helvetica Neue", sans-serif;
      background:
        radial-gradient(circle at 50% 0%, rgba(255,244,221,.95), rgba(20,54,86,.65) 42%, #031324 100%);
      color: var(--ink);
      display: flex;
      justify-content: center;
      padding: 12px;
    }

    .invite {
      width: min(100%, 430px);
      background: var(--navy);
      border-radius: 28px;
      padding: 8px;
      box-shadow: 0 26px 70px rgba(0,0,0,.42);
    }

    .frame {
      min-height: calc(100vh - 40px);
      border: 2px solid var(--gold);
      border-radius: 22px;
      overflow: hidden;
      background: var(--paper);
      position: relative;
    }

    .frame::before {
      content: "";
      position: absolute;
      inset: 10px;
      border: 1px solid rgba(199,164,90,.65);
      border-radius: 16px;
      pointer-events: none;
      z-index: 10;
    }

    .header {
      text-align: center;
      padding: 34px 24px 12px;
      background:
        radial-gradient(circle at 50% 10%, rgba(255,255,255,.8), transparent 34%),
        linear-gradient(180deg, #fff7e9 0%, #f8ead2 100%);
      position: relative;
    }

    .header::after {
      content: "🌿";
      position: absolute;
      top: 12px;
      right: 18px;
      font-size: 2.5rem;
      transform: rotate(-22deg);
      opacity: .65;
    }

    .top-line {
      margin: 0 0 8px;
      font-size: clamp(1.15rem, 4vw, 1.45rem);
      font-weight: 900;
      color: var(--ink);
    }

    .sub-line {
      margin: 0;
      font-size: clamp(1rem, 3.5vw, 1.2rem);
      font-weight: 800;
      color: #244967;
    }

    h1 {
      margin: 8px 0 8px;
      font-size: clamp(3.9rem, 17vw, 6rem);
      line-height: .95;
      font-weight: 900;
      letter-spacing: -2px;
      color: var(--ink);
    }

    .divider {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: var(--gold);
      font-size: 1.7rem;
      margin: 6px auto 0;
    }

    .divider::before,
    .divider::after {
      content: "";
      width: 74px;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--gold));
    }

    .divider::after { background: linear-gradient(90deg, var(--gold), transparent); }

    .visual {
      position: relative;
      height: 315px;
      background: linear-gradient(180deg, #f8ead2 0%, #f7ead5 72%, var(--navy) 72%);
      overflow: hidden;
    }

    .torah-card,
    .shul-card {
      position: absolute;
      bottom: 64px;
      width: 42%;
      height: 205px;
      border-radius: 20px;
      background: rgba(255,250,239,.38);
      border: 1px solid rgba(199,164,90,.45);
      box-shadow: 0 12px 28px rgba(71,48,18,.12);
    }

    .torah-card { left: 20px; transform: rotate(-4deg); }
    .shul-card { right: 20px; }

    .torah-icon {
      position: absolute;
      inset: 20px;
      background:
        linear-gradient(90deg, transparent 0 28%, #7a481e 28% 32%, transparent 32% 68%, #7a481e 68% 72%, transparent 72%),
        linear-gradient(90deg, #fbefd0, #d3ac65, #fff4d8);
      border-radius: 22px;
      border: 2px solid #8d5e21;
    }

    .torah-icon::before,
    .torah-icon::after {
      content: "";
      position: absolute;
      left: 18px;
      right: 18px;
      height: 12px;
      border-radius: 999px;
      background: linear-gradient(90deg, #5d3212, #c98127, #5d3212);
    }
    .torah-icon::before { top: -9px; }
    .torah-icon::after { bottom: -9px; }

    .shul-building {
      position: absolute;
      inset: 22px 16px 0;
      background:
        repeating-linear-gradient(0deg, transparent 0 24px, rgba(125,87,37,.16) 24px 26px),
        repeating-linear-gradient(90deg, transparent 0 30px, rgba(125,87,37,.14) 30px 32px),
        #dec08a;
      border: 2px solid rgba(125,87,37,.25);
      border-radius: 12px 12px 0 0;
    }

    .shul-building::before {
      content: "בית הכנסת\A לב חריש";
      white-space: pre;
      position: absolute;
      top: 28px;
      left: 0;
      right: 0;
      text-align: center;
      font-weight: 900;
      line-height: 1.35;
      color: #463116;
      font-size: .95rem;
    }

    .shul-building::after {
      content: "";
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 58px;
      height: 86px;
      border-radius: 34px 34px 0 0;
      background: #b88f55;
      box-shadow: inset 0 0 0 10px rgba(255,238,202,.65);
    }

    .medal {
      position: absolute;
      left: 50%;
      bottom: 30px;
      transform: translateX(-50%);
      width: 76px;
      height: 76px;
      border-radius: 50%;
      background: var(--navy);
      border: 5px solid var(--gold);
      color: var(--gold-2);
      display: grid;
      place-items: center;
      font-size: 2.2rem;
      z-index: 3;
    }

    .details-wrap {
      background: var(--navy);
      padding: 26px 18px 24px;
    }

    .details {
      background: #fff8ea;
      border: 2px solid var(--gold);
      border-radius: 22px;
      padding: 18px 16px 16px;
      box-shadow: 0 16px 30px rgba(0,0,0,.2);
    }

    .date-line {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      text-align: center;
      align-items: stretch;
      margin-bottom: 14px;
    }

    .date-box {
      border: 1px solid rgba(199,164,90,.55);
      border-radius: 16px;
      padding: 12px 8px;
      background: #fffdf6;
    }

    .date-main {
      font-size: clamp(1.75rem, 8vw, 2.35rem);
      line-height: 1;
      font-weight: 900;
      color: var(--ink);
      white-space: nowrap;
    }

    .date-sub {
      margin-top: 6px;
      color: var(--muted);
      font-weight: 900;
      font-size: .95rem;
    }

    .schedule {
      border-top: 1px solid rgba(199,164,90,.55);
      border-bottom: 1px solid rgba(199,164,90,.55);
      margin: 14px 0;
      padding: 8px 0;
    }

    .schedule-row {
      display: grid;
      grid-template-columns: 82px 1fr;
      direction: ltr;
      gap: 12px;
      align-items: center;
      padding: 9px 2px;
      border-bottom: 1px solid rgba(199,164,90,.22);
    }

    .schedule-row:last-child { border-bottom: 0; }

    .time {
      direction: rtl;
      text-align: center;
      color: var(--ink);
      font-size: 1.15rem;
      font-weight: 900;
      background: rgba(199,164,90,.13);
      border-radius: 999px;
      padding: 7px 6px;
      white-space: nowrap;
    }

    .event {
      direction: rtl;
      text-align: right;
      color: var(--ink);
      font-size: 1.08rem;
      line-height: 1.25;
      font-weight: 900;
    }

    .place {
      text-align: center;
      padding: 2px 0 12px;
    }

    .place-title {
      font-size: clamp(1.35rem, 6vw, 1.75rem);
      line-height: 1.1;
      font-weight: 900;
      color: var(--ink);
    }

    .address {
      margin-top: 7px;
      font-size: 1.05rem;
      font-weight: 900;
      color: var(--muted);
    }

    .waze-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: min(100%, 310px);
      margin: 2px auto 0;
      min-height: 52px;
      border-radius: 999px;
      background: linear-gradient(135deg, #0a3d68, var(--navy));
      color: #fff8ea;
      text-decoration: none;
      border: 2px solid var(--gold);
      font-size: 1.1rem;
      font-weight: 900;
      box-shadow: 0 10px 20px rgba(0,0,0,.18);
    }

    .waze-icon {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: #fff;
      display: grid;
      place-items: center;
      color: var(--ink);
      font-size: 1.1rem;
      flex: 0 0 auto;
    }

    .footer {
      text-align: center;
      color: var(--gold-2);
      font-size: 1.35rem;
      font-weight: 900;
      margin-top: 20px;
    }

    @media (max-width: 390px) {
      body { padding: 8px; }
      .invite { padding: 6px; border-radius: 24px; }
      .frame { min-height: calc(100vh - 28px); }
      .header { padding: 30px 18px 10px; }
      .visual { height: 290px; }
      .torah-card, .shul-card { width: 43%; height: 185px; bottom: 62px; }
      .torah-card { left: 15px; }
      .shul-card { right: 15px; }
      .details-wrap { padding: 24px 13px 22px; }
      .details { padding: 16px 12px; }
      .schedule-row { grid-template-columns: 76px 1fr; gap: 9px; }
      .event { font-size: 1rem; }
      .time { font-size: 1rem; }
    }
  </style>
</head>
<body>
  <main class="invite">
    <section class="frame">
      <header class="header">
        <p class="top-line">נרגשים להזמין אתכם</p>
        <p class="sub-line">לעלייה לתורה של</p>
        <h1>הראל שקד</h1>
        <div class="divider">✡</div>
      </header>

      <section class="visual" aria-hidden="true">
        <div class="torah-card"><div class="torah-icon"></div></div>
        <div class="shul-card"><div class="shul-building"></div></div>
        <div class="medal">✡</div>
      </section>

      <section class="details-wrap">
        <div class="details">
          <div class="date-line">
            <div class="date-box">
              <div class="date-main">18/05</div>
              <div class="date-sub">יום שני</div>
            </div>
            <div class="date-box">
              <div class="date-main">ב׳ בסיון</div>
              <div class="date-sub">תשפ״ו</div>
            </div>
          </div>

          <div class="schedule">
            <div class="schedule-row">
              <div class="time">14:30</div>
              <div class="event">קבלת פנים</div>
            </div>
            <div class="schedule-row">
              <div class="time">15:00</div>
              <div class="event">עלייה לתורה</div>
            </div>
            <div class="schedule-row">
              <div class="time">בסיום</div>
              <div class="event">סעודה קלה חלבית</div>
            </div>
          </div>

          <div class="place">
            <div class="place-title">בית הכנסת לב חריש</div>
            <div class="address">שוהם 82, חריש</div>
          </div>

          <a class="waze-btn" href="https://waze.com/ul/hsvbc0v75s" target="_blank" rel="noopener noreferrer">
            <span>להגעה לחצו כאן</span>
            <span class="waze-icon">🚙</span>
          </a>
        </div>

        <div class="footer">נשמח לראותכם!</div>
      </section>
    </section>
  </main>
</body>
</html>
