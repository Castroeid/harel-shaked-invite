<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>עלייה לתורה להראל שקד</title>

  <!-- Share preview -->
  <meta property="og:title" content="עלייה לתורה להראל שקד" />
  <meta property="og:description" content="יום שני | 18/05 | בית הכנסת לב חריש" />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://castroeid.github.io/harel/" />
  <meta property="og:image" content="https://castroeid.github.io/harel/assets/preview.png" />
  <meta property="og:image:secure_url" content="https://castroeid.github.io/harel/assets/preview.png" />
  <meta property="og:image:type" content="image/png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />

  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="עלייה לתורה להראל שקד" />
  <meta name="twitter:description" content="יום שני | 18/05 | בית הכנסת לב חריש" />
  <meta name="twitter:image" content="https://castroeid.github.io/harel/assets/preview.png" />

  <!-- ביצועים -->
  <link rel="preload" as="image" href="assets/invite-full.webp" />

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      height: 100vh;
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #0b223a;
    }

    .container {
      position: relative;
      width: 100%;
      max-width: 430px;
      height: 100vh;
      max-height: 900px;
      overflow: hidden;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,.5);
    }

    .bg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,.65), rgba(0,0,0,0) 45%);
    }

    /* כפתור Waze מורם יותר למעלה */
    .waze-btn {
      position: absolute;
      bottom: 90px; /* היה 30px – הרמנו */
      left: 50%;
      transform: translateX(-50%);
      width: 85%;
      height: 56px;
      border-radius: 999px;
      background: linear-gradient(135deg, #0a3d68, #08223d);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      font-size: 1.2rem;
      font-weight: bold;
      text-decoration: none;
      border: 2px solid #c7a45a;
      box-shadow: 0 10px 20px rgba(0,0,0,.4);
    }

    .waze-icon {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: white;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #08223d;
      font-size: 1.2rem;
    }

    /* טקסט אישור הגעה */
    .rsvp {
      position: absolute;
      bottom: 30px;
      width: 100%;
      text-align: center;
      color: #fff4d6;
      font-size: 1.1rem;
      font-weight: bold;
      text-shadow: 0 2px 6px rgba(0,0,0,.6);
    }

    @media (max-width: 390px) {
      .waze-btn {
        height: 50px;
        font-size: 1.05rem;
        bottom: 80px;
      }
      .rsvp {
        font-size: 1rem;
        bottom: 22px;
      }
    }
  </style>
</head>

<body>

  <div class="container">
    <!-- תמונת ההזמנה -->
    <img class="bg"
         src="assets/invite-full.webp"
         alt="הזמנה"
         loading="eager"
         fetchpriority="high" />

    <!-- הצללה -->
    <div class="overlay"></div>

    <!-- כפתור ניווט Waze (קואורדינטות + ניווט) -->
    <a class="waze-btn"
       href="https://waze.com/ul?ll=32.47386,35.04692&navigate=yes"
       target="_blank"
       rel="noopener noreferrer">
      <span>להגעה לחצו כאן</span>
      <span class="waze-icon">🚗</span>
    </a>

    <!-- אישור הגעה -->
    <div class="rsvp">אנא אשרו הגעתכם.</div>
  </div>

</body>
</html>
