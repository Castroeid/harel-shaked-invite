<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>עלייה לתורה להראל שקד</title>

  <!-- Share preview -->
  <meta property="og:title" content="עלייה לתורה להראל שקד" />
  <meta property="og:description" content="יום שני | 18/05 | בית הכנסת לב חריש" />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://castroeid.github.io/harel/" />
  <meta property="og:image" content="https://castroeid.github.io/harel/assets/preview.webp" />

  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:image" content="https://castroeid.github.io/harel/assets/preview.webp" />

  <link rel="preload" as="image" href="assets/preview.webp" />

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      height: 100vh;
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #0b223a;
    }

    .container {
      position: relative;
      width: 100%;
      max-width: 430px;
      height: 100vh;
      max-height: 900px;
      overflow: hidden;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,.5);
    }

    .bg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,.65), rgba(0,0,0,0) 45%);
    }

    .btn {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      width: 85%;
      height: 56px;
      border-radius: 999px;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      font-size: 1.1rem;
      font-weight: bold;
      text-decoration: none;
      border: 2px solid #c7a45a;
      box-shadow: 0 10px 20px rgba(0,0,0,.4);
    }

    .waze-btn {
      bottom: 110px;
      background: linear-gradient(135deg, #0a3d68, #08223d);
    }

    .wa-btn {
      bottom: 40px;
      background: linear-gradient(135deg, #25D366, #128C7E);
    }

    .icon {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: white;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #08223d;
      font-size: 1.2rem;
    }
  </style>
</head>

<body>

  <div class="container">
    <img class="bg" src="assets/preview.webp" alt="הזמנה" />

    <div class="overlay"></div>

    <!-- ניווט Waze -->
    <a class="btn waze-btn"
       href="https://waze.com/ul?ll=32.47363,35.04670&navigate=yes"
       target="_blank">
      <span>להגעה לחצו כאן</span>
      <span class="icon">🚗</span>
    </a>

    <!-- וואטסאפ אישור הגעה -->
    <a class="btn wa-btn"
       href="https://wa.me/972526211036?text=%D7%94%D7%99%D7%99%20%D7%9E%D7%90%D7%A9%D7%A8%20%D7%94%D7%92%D7%A2%D7%94%20%D7%9C%D7%A2%D7%9C%D7%99%D7%99%D7%94%20%D7%9C%D7%AA%D7%95%D7%A8%D7%94%20%D7%A9%D7%9C%20%D7%94%D7%A8%D7%90%D7%9C"
       target="_blank">
      <span>אישור הגעה בוואטסאפ</span>
      <span class="icon">💬</span>
    </a>

  </div>

</body>
</html>
